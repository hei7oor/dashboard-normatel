name: Sincronizar Produttivo

on:
  # agendamento DESLIGADO temporariamente (2026-07-14) — o filtro actives=true
  # não se comportou como o esperado numa conta real (trouxe ~30 mil "atividades"
  # em REALIZAR.xlsx e 0 em FINALIZADAS.xlsx, sobrescrevendo dados bons). Só
  # religar depois de validar o mapeamento de status/filtros com dados reais.
  # - cron: "0 9-21/2 * * 1-6"   # a cada 2h, das 06h às 18h (Brasília), seg-sáb
  workflow_dispatch: {}          # permite rodar manualmente pela aba "Actions", para testar

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pandas openpyxl requests

      - name: Buscar atividades do Produttivo e atualizar o dashboard
        env:
          PRODUTTIVO_LOGIN: ${{ secrets.PRODUTTIVO_LOGIN }}
          PRODUTTIVO_TOKEN: ${{ secrets.PRODUTTIVO_TOKEN }}
          PRODUTTIVO_REGISTER: ${{ secrets.PRODUTTIVO_REGISTER }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_DASHBOARD }}
          # quantos dias pra trás buscar; pode aumentar se faltar alguma atividade
          # antiga, mas quanto maior, mais demorada fica cada sincronização
          PRODUTTIVO_DIAS_HISTORICO: "90"    # atividades finalizadas
          PRODUTTIVO_DIAS_ABERTAS: "365"     # atividades a realizar / em andamento
        run: python -u scripts/sync_produtivo.py
