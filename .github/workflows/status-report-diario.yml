name: Status Report Diário RA/SP

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 07:00 horário de Brasília (sem horário de verão)
  workflow_dispatch: {}     # permite rodar manualmente pela aba "Actions", para testar

jobs:
  enviar-relatorio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pandas openpyxl requests

      - name: Enviar status report
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_DASHBOARD }}
        run: python scripts/status_report.py
